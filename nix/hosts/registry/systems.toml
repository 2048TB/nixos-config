# Central host registry (source of truth for host discovery).
# Host directories must be both:
# 1) present on disk with required files
# 2) declared in this registry

[nixos.zky]
system = "x86_64-linux"
profiles = ["desktop", "laptop"]
deployEnabled = true
deployHost = "zky"
deployUser = "root"
deployPort = 22

[nixos.zly]
system = "x86_64-linux"
profiles = ["desktop"]
deployEnabled = true
deployHost = "zly"
deployUser = "root"
deployPort = 22

[nixos.zzly]
system = "x86_64-linux"
profiles = ["desktop"]
deployEnabled = true
deployHost = "zzly"
deployUser = "root"
deployPort = 22

[darwin.zly-mac]
system = "aarch64-darwin"
profiles = ["desktop", "laptop"]
deployEnabled = true
deployHost = "zly-mac"
deployUser = "z"
deployPort = 22
