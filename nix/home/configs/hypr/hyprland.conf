# key/command aliases
$mainMod = SUPER
$userBin = @PROFILE_BIN@
$systemBin = /run/current-system/sw/bin
$submapCycle = $userBin/hyprland-submap-cycle
$fuzzelBin = $userBin/fuzzel
$lockBin = $userBin/hyprlock
$screenshotBin = @RIVER_SCREENSHOT_BIN@
$playerctlBin = @PLAYERCTL_BIN@
$brightnessctlBin = $userBin/brightnessctl
$layoutToggleBin = $userBin/hyprland-layout-toggle
$layoutDispatchBin = $userBin/hyprland-layout-dispatch

exec-once = $systemBin/mkdir -p @HOME_DIR@/.local/state/hyprland
exec-once = $systemBin/printf 'normal\n' > @HOME_DIR@/.local/state/hyprland/submap

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# per-monitor 缩放规则（替代通用 wlr-randr 启动脚本）
monitor = DP-2, preferred, auto, 1.25
monitor = DP-1, preferred, auto, 1.25
monitor = HDMI-A-1, preferred, auto, 1.25
monitor = eDP-1, preferred, auto, 1.25
monitor = , preferred, auto, 1.00

# Hyprland 官方文档建议：分数缩放下，XWayland 默认会出现发虚/像素化问题。
# force_zero_scaling 让 XWayland 窗口以 1x 渲染，避免被 compositor 再做分数缩放插值。
xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = true
}

misc {
  disable_hyprland_logo = true
  disable_splash_rendering = true
}

input {
  repeat_rate = 50
  repeat_delay = 300
  # 禁用鼠标悬停自动聚焦，焦点只由键盘/点击切换
  follow_mouse = 0
}

cursor {
  # 关闭 Hyprcursor 接管，使用 XCursor 主题链路
  enable_hyprcursor = false
}

general {
  border_size = 0
  col.active_border = rgba(4a3f64ff)
  col.inactive_border = rgba(2c2938ff)
  gaps_in = 6
  gaps_out = 2
  layout = master
}

decoration {
  rounding = 0
}

master {
  mfact = 0.55
  new_status = master
  orientation = left
}

# scrolling 布局参数（官方文档: Configuring/Scrolling-Layout）
scrolling {
  # 与原 master mfact 接近，降低迁移突兀感
  column_width = 0.55
  focus_fit_method = 1
  follow_focus = true
  follow_min_visible = 0.4
  explicit_column_widths = 0.333, 0.5, 0.55, 0.667, 1.0
  direction = right
}

# 常驻工作区（即使为空也保留）
@HYPR_PERSISTENT_WORKSPACES@

# 常用工具窗口规则（river 中不具备的精细窗口控制）
# pavucontrol 在不同发行版下类名可能不同，合并规则提高匹配稳定性
@HYPR_FLOAT_WINDOW_RULE_TRIPLETS@
# 避免部分应用请求 maximize 导致 tiling 会话下行为异常（Hyprland 新语法）
windowrule = match:class .*, suppress_event maximize

bind = $mainMod, Return, exec, ghostty
bind = $mainMod, Space, exec, $fuzzelBin
bind = $mainMod, D, exec, nautilus
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod CTRL, C, exec, $userBin/river-cliphist-menu
bind = $mainMod CTRL, S, exec, pavucontrol
bind = $mainMod CTRL, B, exec, $systemBin/pkill -SIGUSR1 waybar
bind = $mainMod CTRL, R, exec, $systemBin/hyprctl reload
bind = $mainMod, T, exec, $layoutToggleBin
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod SHIFT, L, exec, $lockBin
bind = $mainMod SHIFT, S, movetoworkspace, special:scratchpad
bind = $mainMod CTRL, E, exec, $userBin/wlogout-menu
bind = $mainMod, apostrophe, pin

# 焦点/交换/移动（常用双键）
bind = $mainMod, right, movewindow, r
bind = $mainMod, left, movewindow, l
bind = $mainMod, down, movewindow, d
bind = $mainMod, up, movewindow, u
# 参考 JaKooLit/ML4W/Hyprdots：四向焦点（Vim 风格）
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
# 高频功能二键化：保留左右交换
bind = $mainMod, comma, swapwindow, l
bind = $mainMod, period, swapwindow, r
# 兼容旧习惯：额外保留四向窗口移动（多修饰键）
bind = $mainMod CTRL SHIFT, left, movewindow, l
bind = $mainMod CTRL SHIFT, right, movewindow, r
bind = $mainMod CTRL SHIFT, down, movewindow, d
bind = $mainMod CTRL SHIFT, up, movewindow, u
# 兼容旧习惯：额外保留双键窗口移动别名
bind = $mainMod, Home, movewindow, l
bind = $mainMod, End, movewindow, r
bind = $mainMod, Page_Up, movewindow, u
bind = $mainMod, Page_Down, movewindow, d
# 多显示器操作（参考官方 Dispatchers + 常见 Hyprland dotfiles）
bind = $mainMod SHIFT ALT, H, focusmonitor, l
bind = $mainMod SHIFT ALT, J, focusmonitor, d
bind = $mainMod SHIFT ALT, K, focusmonitor, u
bind = $mainMod SHIFT ALT, L, focusmonitor, r
bind = $mainMod CTRL, H, movewindow, mon:l
bind = $mainMod CTRL, J, movewindow, mon:d
bind = $mainMod CTRL, K, movewindow, mon:u
bind = $mainMod CTRL, L, movewindow, mon:r
bind = $mainMod CTRL SHIFT, H, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, J, movecurrentworkspacetomonitor, d
bind = $mainMod CTRL SHIFT, K, movecurrentworkspacetomonitor, u
bind = $mainMod CTRL SHIFT, L, movecurrentworkspacetomonitor, r
# 全局窗口尺寸微调（与 float submap 共存）
# 使用 SUPER+ALT，避免与 SUPER+SHIFT+L 锁屏冲突
binde = $mainMod ALT, H, resizeactive, -80 0
binde = $mainMod ALT, L, resizeactive, 80 0
binde = $mainMod ALT, J, resizeactive, 0 80
binde = $mainMod ALT, K, resizeactive, 0 -80
bind = ALT, Tab, cyclenext
# `bringactivetotop` 已 deprecated，改为等价的 z-order 提升
bind = ALT, Tab, alterzorder, top

bind = $mainMod, Z, fullscreen, 0
bind = $mainMod, F, exec, $layoutDispatchBin focus
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, V, togglefloating

# 布局控制（master / scrolling 双模式自适配）
bind = $mainMod CTRL, up, exec, $layoutDispatchBin grow
bind = $mainMod CTRL, down, exec, $layoutDispatchBin shrink
bind = $mainMod CTRL, right, exec, $layoutDispatchBin right
bind = $mainMod CTRL, left, exec, $layoutDispatchBin left
bind = $mainMod SHIFT, up, exec, $layoutDispatchBin shift-up
bind = $mainMod SHIFT, right, exec, $layoutDispatchBin shift-right
bind = $mainMod SHIFT, down, exec, $layoutDispatchBin shift-down
bind = $mainMod SHIFT, left, exec, $layoutDispatchBin shift-left

bind = , Print, exec, $screenshotBin area
bind = $mainMod, X, exec, $screenshotBin area

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse:274, togglefloating
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod SHIFT, mouse_down, movetoworkspace, e+1
bind = $mainMod SHIFT, mouse_up, movetoworkspace, e-1

bind = $mainMod, G, exec, $submapCycle set float
bind = $mainMod, P, exec, $submapCycle set passthrough

submap = float
bind = , Escape, exec, $submapCycle set normal
bind = , Return, exec, $submapCycle set normal
bind = , Space, exec, $submapCycle set normal
bind = , V, togglefloating
binde = , left, moveactive, -100 0
binde = , down, moveactive, 0 100
binde = , up, moveactive, 0 -100
binde = , right, moveactive, 100 0
binde = SHIFT, left, resizeactive, -100 0
binde = SHIFT, down, resizeactive, 0 100
binde = SHIFT, up, resizeactive, 0 -100
binde = SHIFT, right, resizeactive, 100 0
binde = CTRL, left, moveactive, -300 0
binde = CTRL, down, moveactive, 0 300
binde = CTRL, up, moveactive, 0 -300
binde = CTRL, right, moveactive, 300 0
submap = reset

submap = passthrough
bind = $mainMod, P, exec, $submapCycle set normal
bind = , Escape, exec, $submapCycle set normal
submap = reset

@HYPR_WORKSPACE_SWITCH_BINDS@
@HYPR_WORKSPACE_MOVE_BINDS@
# 静默发送窗口到工作区（不跟随切换）
@HYPR_WORKSPACE_SILENT_MOVE_BINDS@
# 相对工作区导航（避免与 SUPER+CTRL 方向键的 master 布局控制冲突）
bind = $mainMod ALT, right, workspace, r+1
bind = $mainMod ALT, left, workspace, r-1
bind = $mainMod ALT, down, workspace, empty
# 纯键盘发送到相邻工作区（双键）
bind = $mainMod, B, movetoworkspace, r-1
bind = $mainMod, N, movetoworkspace, r+1
bind = $mainMod, Tab, workspace, previous
bind = $mainMod SHIFT, Tab, movetoworkspace, previous

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.01+ --limit 1.0
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.01-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioPlay, exec, $playerctlBin play-pause
bindl = , XF86AudioPause, exec, $playerctlBin pause
bindl = , XF86AudioNext, exec, $playerctlBin next
bindl = , XF86AudioPrev, exec, $playerctlBin previous
bindel = , XF86MonBrightnessUp, exec, $brightnessctlBin --class=backlight set 5%+
bindel = , XF86MonBrightnessDown, exec, $brightnessctlBin --class=backlight set 5%-
