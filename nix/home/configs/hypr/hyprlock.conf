$font = Maple Mono NF CN

general {
  hide_cursor = true
  immediate_render = true
  fail_timeout = 18000
}

animations {
  enabled = true
  bezier = easeOut, 0.16, 1, 0.3, 1
  animation = fadeIn, 1, 2.8, easeOut
  animation = fadeOut, 1, 1.8, easeOut
  animation = inputFieldDots, 1, 1.6, easeOut
}

background {
  monitor =
  path = $HOME/.config/wallpapers/1.png
  color = rgba(1e1e2eff)
  blur_size = 8
  blur_passes = 3
  noise = 0.011
  contrast = 0.95
  brightness = 0.80
  vibrancy = 0.20
  vibrancy_darkness = 0.10
}

shape {
  monitor =
  size = 520, 320
  color = rgba(181825cc)
  rounding = 22
  border_size = 1
  border_color = rgba(89b4faaa)
  position = 0, 0
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  color = rgba(cdd6f4ff)
  font_size = 66
  font_family = $font
  position = 0, 82
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date +"%A, %Y-%m-%d"
  color = rgba(a6adc8ff)
  font_size = 22
  font_family = $font
  position = 0, 38
  halign = center
  valign = center
}

label {
  monitor =
  text = $USER
  color = rgba(89b4faff)
  font_size = 24
  font_family = $font
  position = 0, -88
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 360, 56
  outline_thickness = 2
  dots_size = 0.24
  dots_spacing = 0.28
  dots_center = true
  inner_color = rgba(313244ee)
  font_color = rgba(cdd6f4ff)
  outer_color = rgba(89b4faff)
  check_color = rgba(a6e3a1ff)
  fail_color = rgba(f38ba8ff)
  capslock_color = rgba(f9e2afff)
  fade_on_empty = false
  placeholder_text = <i>Input password...</i>
  fail_text = <i>$FAIL ($ATTEMPTS)</i>
  hide_input = false
  rounding = 14
  font_family = $font
  position = 0, -28
  halign = center
  valign = center
}
