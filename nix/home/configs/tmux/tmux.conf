set -g mouse on
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -sg repeat-time 600
set -g status on
set -g status-position bottom
set -g status-style "bg=black,fg=white"
set -g status-left-length 30
set -g status-right-length 100
set -g status-right '#[fg=cyan]#(uptime | awk '\''{print $3" "$4}'\'') #[fg=white]%H:%M'
set -g status-interval 10
set -g display-time 4000
set -g display-panes-time 800
set -g message-limit 200
set -g detach-on-destroy no-detached
set -g set-titles on
set -g set-titles-string '#T'
setw -g automatic-rename on
set -g focus-events on
set -g set-clipboard external
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB"

set -g prefix C-b
unbind C-a
bind C-b send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Pane navigation (prefix + arrow keys)
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Split panes (prefix + w/e)
bind w split-window -h -c "#{pane_current_path}"
bind e split-window -v -c "#{pane_current_path}"

# Pane lifecycle and tabs/windows
bind q kill-pane
bind z resize-pane -Z
bind c new-window
bind d next-window
bind s previous-window
bind g detach-client
bind Tab last-window
bind t display-panes
bind F choose-tree -Zw

# Resize panes (prefix + h/j/k/l, repeatable)
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
