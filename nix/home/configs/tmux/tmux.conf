set -g mouse on
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -sg repeat-time 600
set -g status-interval 5
set -g display-time 4000
set -g display-panes-time 800
set -g message-limit 200
set -g detach-on-destroy no-detached
set -g set-titles on
set -g focus-events on
set -g set-clipboard external
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-b
unbind C-a
bind C-b send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Pane navigation (prefix + arrow keys)
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes (prefix + v/s), keep classic aliases
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane lifecycle and tabs/windows
bind x kill-pane
bind z resize-pane -Z
bind c new-window
bind w next-window
bind q previous-window
bind g detach-client
bind Tab last-window
bind p display-panes
bind W choose-tree -Zw

# Resize panes (prefix + a/d/e/f, repeatable; left-hand friendly)
bind -r a resize-pane -L 5
bind -r d resize-pane -D 5
bind -r e resize-pane -U 5
bind -r f resize-pane -R 5
