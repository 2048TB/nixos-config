set -g mouse on
set -g history-limit 20000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes (prefix + v/s), keep classic aliases
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane lifecycle and tabs/windows
bind x kill-pane
bind z resize-pane -Z
bind c new-window
bind n next-window
bind p previous-window

# Resize panes (prefix + y/u/i/o, repeatable)
bind -r y resize-pane -L 5
bind -r u resize-pane -D 5
bind -r i resize-pane -U 5
bind -r o resize-pane -R 5
