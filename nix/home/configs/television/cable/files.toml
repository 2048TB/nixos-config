[metadata]
name = "files"
description = "A channel to select files and directories"
requirements = ["fd", "bat"]

[source]
command = ["fd -t f", "fd -t f -H"]

[preview]
command = "bat -n --color=always '{}'"
env = { BAT_THEME = "ansi" }

[keybindings]
shortcut = "f1"
f12 = "actions:edit"
ctrl-up = "actions:goto_parent_dir"

[actions.edit]
description = "Open the selected entry with the default editor"
command = "${EDITOR:-vim} '{}'"
mode = "execute"

[actions.goto_parent_dir]
description = "Re-open tv in the parent directory"
command = "tv files .."
mode = "execute"
