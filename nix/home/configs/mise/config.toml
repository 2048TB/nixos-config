# Global runtime defaults track rolling channels.
# Actual upgrades are applied only when `mise upgrade` runs (`just mise-upgrade` by default).
# Individual repos can still override these with their own mise.toml.

[settings]
all_compile = false
not_found_auto_install = false

[settings.python]
precompiled_flavor = "install_only_stripped"

[tools]
node = "latest"
# Keep the global Python on a vLLM/PyTorch-compatible minor by default.
python = "3.12"
go = "latest"
"rust" = { version = "stable", components = "rust-analyzer", targets = "x86_64-pc-windows-gnu" }
bun = "latest"
zig = "latest"
zls = "latest"
uv = "latest"
pnpm = "latest"
"npm:typescript" = "latest"
"npm:typescript-language-server" = "latest"
"npm:pyright" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
"go:github.com/cweill/gotests/gotests" = "latest"
"go:github.com/josharian/impl" = "latest"
"go:github.com/haya14busa/goplay/cmd/goplay" = "latest"
"go:mvdan.cc/garble" = "latest"
golangci-lint = "latest"
staticcheck = "latest"
"shfmt" = "latest"
"cargo:cargo-nextest" = "latest"
biome = "latest"
"pipx:black" = "latest"
"pipx:ruff" = "latest"
"pipx:pipx" = "latest"
"pipx:pytest" = "latest"
"ubi:aristocratos/btop" = "latest"
duf = "latest"
dust = "latest"
fastfetch = "latest"
gitui = "latest"
sd = "latest"
taplo = "latest"
yamllint = "latest"
