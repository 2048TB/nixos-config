# Global runtime defaults stay current without pushing language versions through Nix.
# Individual repos can still override these with their own mise.toml.

[settings]
all_compile = false
not_found_auto_install = false

[settings.python]
precompiled_flavor = "install_only_stripped"

[tools]
node = "24"
python = "3.14"
go = "1.26"
"rust" = { version = "stable", components = "rust-analyzer", targets = "x86_64-pc-windows-gnu" }
bun = "1.3"
zig = "0.15"
zls = "latest"
uv = "latest"
pnpm = "latest"
"npm:typescript" = "6.0.2"
"npm:typescript-language-server" = "5.1.3"
"npm:pyright" = "1.1.408"
"go:golang.org/x/tools/gopls" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/go-delve/delve/cmd/dlv" = "latest"
golangci-lint = "latest"
staticcheck = "latest"
"shfmt" = "latest"
"cargo:cargo-nextest" = "latest"
biome = "latest"
"pipx:black" = "latest"
"pipx:ruff" = "latest"
"pipx:pipx" = "latest"
"pipx:pytest" = "latest"
