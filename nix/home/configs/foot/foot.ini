# foot 终端配置

[main]
font=Fira Code:size=13
dpi-aware=no
pad=12x12
selection-target=clipboard
login-shell=yes

[scrollback]
lines=100000
multiplier=5

[cursor]
style=bar
blink=yes

[mouse]
hide-when-typing=yes

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
spawn-terminal=Control+Shift+n
search-start=Control+Shift+r

[colors]
alpha=1.0
foreground=cdd6f4
background=1e1e2e
selection-foreground=cdd6f4
selection-background=45475a

regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=cba6f7
regular6=94e2d5
regular7=bac2de

bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=cba6f7
bright6=94e2d5
bright7=a6adc8
