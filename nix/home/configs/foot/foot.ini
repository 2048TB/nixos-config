# foot 终端配置

[main]
font=Fira Code:size=13, Maple Mono NF CN:size=13
dpi-aware=no
pad=12x12 center
selection-target=clipboard
login-shell=yes

[scrollback]
lines=100000
multiplier=5

[cursor]
style=beam
blink=yes
color=1e1e2e f5e0dc

[mouse]
hide-when-typing=yes

[key-bindings]
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down

[colors]
alpha=1.0
foreground=cdd6f4
background=1e1e2e
selection-foreground=cdd6f4
selection-background=45475a
urls=89b4fa

regular0=45475a
regular1=f38ba8
regular2=a6e3a1
regular3=f9e2af
regular4=89b4fa
regular5=cba6f7
regular6=94e2d5
regular7=bac2de

bright0=585b70
bright1=f38ba8
bright2=a6e3a1
bright3=f9e2af
bright4=89b4fa
bright5=cba6f7
bright6=94e2d5
bright7=a6adc8
