# foot 终端配置
# 配置文档：foot.ini(5)

[main]
# VPS/minimal images often miss foot terminfo; use the common fallback.
term=xterm-256color
app-id=foot
title=foot
font=Fira Code:size=13,Maple Mono NF CN:size=13
font-size-adjustment=1
dpi-aware=no
bold-text-in-bright=no
pad=12x12 center
selection-target=clipboard
login-shell=yes
workers=0

[security]
osc52=copy-enabled

[scrollback]
lines=100000
multiplier=5
indicator-position=relative
indicator-format=line

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[cursor]
style=beam
blink=yes
beam-thickness=1.5

[mouse]
hide-when-typing=yes
alternate-scroll-mode=yes

[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
search-start=Control+Shift+r
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
spawn-terminal=Control+Shift+n
fullscreen=F11
show-urls-launch=Control+Shift+o
unicode-input=Control+Shift+u
scrollback-up-page=Shift+Page_Up Shift+KP_Page_Up
scrollback-down-page=Shift+Page_Down Shift+KP_Page_Down
scrollback-up-line=Shift+Up
scrollback-down-line=Shift+Down

[colors]
alpha=1.0
foreground=@THEME_FG@
background=@THEME_BG@
cursor=@THEME_BG@ @THEME_FG2@
selection-foreground=@THEME_FG@
selection-background=@THEME_BG2@
urls=@THEME_BLUE@

regular0=@THEME_BG1@
regular1=@THEME_RED@
regular2=@THEME_GREEN@
regular3=@THEME_YELLOW@
regular4=@THEME_BLUE@
regular5=@THEME_PURPLE@
regular6=@THEME_CYAN@
regular7=@THEME_FG1@

bright0=@THEME_BG3@
bright1=@THEME_RED@
bright2=@THEME_GREEN@
bright3=@THEME_YELLOW@
bright4=@THEME_BLUE@
bright5=@THEME_PURPLE@
bright6=@THEME_TEAL@
bright7=@THEME_FG2@
