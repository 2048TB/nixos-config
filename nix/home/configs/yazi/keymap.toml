[mgr]
keymap = [
  { on = "<Esc>", run = "escape", desc = "Exit visual mode, clear selection, or cancel search" },
  { on = "<C-[>", run = "escape", desc = "Exit visual mode, clear selection, or cancel search" },
  { on = "q", run = "quit", desc = "Quit the process" },
  { on = "<C-q>", run = "quit --no-cwd-file", desc = "Quit without outputting cwd-file" },
  { on = "<C-c>", run = "close", desc = "Close the current tab, or quit if it's last" },
  { on = "<C-z>", run = "suspend", desc = "Suspend the process" },

  # Navigation
  { on = "<Up>", run = "arrow prev", desc = "Previous file" },
  { on = "<Down>", run = "arrow next", desc = "Next file" },
  { on = "<C-u>", run = "arrow -50%", desc = "Move cursor up half page" },
  { on = "<C-d>", run = "arrow 50%", desc = "Move cursor down half page" },
  { on = "<C-b>", run = "arrow -100%", desc = "Move cursor up one page" },
  { on = "<C-f>", run = "arrow 100%", desc = "Move cursor down one page" },
  { on = [ "g", "g" ], run = "arrow top", desc = "Go to top" },
  { on = "<Left>", run = "leave", desc = "Back to the parent directory" },
  { on = "<Right>", run = "enter", desc = "Enter the child directory" },
  { on = "e", run = "back", desc = "Back to previous directory" },
  { on = "b", run = "forward", desc = "Forward to next directory" },

  # Selection
  { on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "Toggle the current selection state" },
  { on = "<C-a>", run = "toggle_all --state=on", desc = "Select all files" },
  { on = "<C-r>", run = "toggle_all", desc = "Invert selection of all files" },
  { on = "v", run = "visual_mode", desc = "Enter visual mode (selection mode)" },
  { on = [ "v", "x" ], run = "visual_mode --unset", desc = "Enter visual mode (unset mode)" },

  # File operations
  { on = "f", run = "open", desc = "Open selected files" },
  { on = [ "f", "f" ], run = "open --interactive", desc = "Open selected files interactively" },
  { on = "<Enter>", run = "open", desc = "Open selected files" },
  { on = [ "x", "c" ], run = "yank", desc = "Yank selected files (copy)" },
  { on = [ "x", "x" ], run = "yank --cut", desc = "Yank selected files (cut)" },
  { on = [ "x", "v" ], run = "paste", desc = "Paste yanked files" },
  { on = [ "x", "f" ], run = "paste --force", desc = "Paste yanked files (overwrite if the destination exists)" },
  { on = [ "x", "q" ], run = "unyank", desc = "Cancel the yank status" },
  { on = [ "x", "-" ], run = "link", desc = "Symlink the absolute path of yanked files" },
  { on = [ "x", "+" ], run = "link --relative", desc = "Symlink the relative path of yanked files" },
  { on = [ "x", "d" ], run = "remove", desc = "Trash selected files" },
  { on = [ "x", "z" ], run = "remove --permanently", desc = "Permanently delete selected files" },
  { on = [ "x", "a" ], run = "create", desc = "Create a file (ends with / for directories)" },
  { on = [ "x", "r" ], run = "rename --cursor=before_ext", desc = "Rename selected file(s)" },

  # Copy paths
  { on = [ "c", "c" ], run = "copy path", desc = "Copy the file path" },
  { on = [ "c", "d" ], run = "copy dirname", desc = "Copy the directory path" },
  { on = [ "c", "f" ], run = "copy filename", desc = "Copy the filename" },
  { on = [ "c", "e" ], run = "copy name_without_ext", desc = "Copy the filename without extension" },

  # Search / filter
  { on = "r", run = "search --via=fd", desc = "Search files by name via fd" },
  { on = [ "r", "t" ], run = "search --via=rg", desc = "Search files by content via ripgrep" },
  { on = [ "r", "f" ], run = "filter --smart", desc = "Filter files" },
  { on = [ "r", "v" ], run = 'search_do --via=fd --args="-d 3"', desc = "Switch to flat view (depth 3)" },
  { on = [ "r", "e" ], run = "find --smart", desc = "Find next file" },
  { on = [ "r", "w" ], run = "find --previous --smart", desc = "Find previous file" },
  { on = [ "r", "d" ], run = "find_arrow", desc = "Next found" },
  { on = [ "r", "q" ], run = "find_arrow --previous", desc = "Previous found" },
  { on = "<C-s>", run = "escape --search", desc = "Cancel the ongoing search" },
  { on = "z", run = "plugin fzf", desc = "Jump to a file/directory via fzf" },

  # Info / display / sorting
  { on = [ "d", "i" ], run = "spot", desc = "Spot hovered file" },
  { on = [ "d", "h" ], run = "hidden toggle", desc = "Toggle the visibility of hidden files" },
  { on = [ ",", "n" ], run = "sort natural --reverse=no", desc = "Sort naturally" },
  { on = [ ",", "a" ], run = "sort natural --reverse=yes", desc = "Sort naturally (reverse)" },
  { on = [ ",", "s" ], run = [ "sort size --reverse=no", "linemode size" ], desc = "Sort by size" },
  { on = [ ",", "d" ], run = [ "sort size --reverse=yes", "linemode size" ], desc = "Sort by size (reverse)" },
  { on = [ ",", "m" ], run = [ "sort mtime --reverse=no", "linemode mtime" ], desc = "Sort by modified time" },
  { on = [ ",", "t" ], run = [ "sort mtime --reverse=yes", "linemode mtime" ], desc = "Sort by modified time (reverse)" },
  { on = [ "d", "s" ], run = "linemode size", desc = "Linemode: size" },
  { on = [ "d", "p" ], run = "linemode permissions", desc = "Linemode: permissions" },
  { on = [ "d", "b" ], run = "linemode btime", desc = "Linemode: btime" },
  { on = [ "d", "m" ], run = "linemode mtime", desc = "Linemode: mtime" },
  { on = [ "d", "o" ], run = "linemode owner", desc = "Linemode: owner" },
  { on = [ "d", "n" ], run = "linemode none", desc = "Linemode: none" },

  # Jump
  { on = [ "g", "a" ], run = "cd ~", desc = "Go home" },
  { on = [ "g", "b" ], run = "arrow bot", desc = "Go to bottom" },
  { on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go ~/Downloads" },
  { on = [ "g", "c" ], run = "cd ~/.config", desc = "Go ~/.config" },
  { on = [ "g", "s" ], run = "cd /persistent", desc = "Go /persistent" },
  { on = [ "g", "r" ], run = "cd /persistent/nixos-config", desc = "Go /persistent/nixos-config" },
  { on = [ "g", "t" ], run = "cd /tmp", desc = "Go /tmp" },
  { on = [ "g", "<Space>" ], run = "cd --interactive", desc = "Jump interactively" },
  { on = [ "g", "f" ], run = "follow", desc = "Follow hovered symlink" },
  { on = [ "z", "z" ], run = "plugin zoxide", desc = "Jump to a directory via zoxide" },

  # Shell
  { on = ";", run = "shell --interactive", desc = "Run a shell command" },
  { on = "'", run = "shell --block --interactive", desc = "Run a shell command (block until finishes)" },

  # Tabs / tasks
  { on = [ "t", "t" ], run = "tab_create --current", desc = "Create a new tab with CWD" },
  { on = [ "t", "b" ], run = "tab_create", desc = "Create a new tab with home" },
  { on = [ "t", "q" ], run = "tab_switch 0", desc = "Switch to first tab" },
  { on = [ "t", "w" ], run = "tab_switch 1", desc = "Switch to second tab" },
  { on = [ "t", "e" ], run = "tab_switch 2", desc = "Switch to third tab" },
  { on = [ "t", "r" ], run = "tab_switch 3", desc = "Switch to fourth tab" },
  { on = [ "t", "f" ], run = "tab_switch 4", desc = "Switch to fifth tab" },
  { on = [ "t", "a" ], run = "tab_switch -1 --relative", desc = "Switch to previous tab" },
  { on = [ "t", "d" ], run = "tab_switch 1 --relative", desc = "Switch to next tab" },
  { on = [ "t", "z" ], run = "tab_swap -1", desc = "Swap current tab with previous tab" },
  { on = [ "t", "c" ], run = "tab_swap 1", desc = "Swap current tab with next tab" },
  { on = [ "t", "s" ], run = "tasks:show", desc = "Show task manager" },
  { on = [ "t", "x" ], run = "close", desc = "Close the current tab, or quit if it's last" },

  # Help
  { on = "<F1>", run = "help", desc = "Open help" },
]
