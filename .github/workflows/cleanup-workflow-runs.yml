name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: "27 3 * * 0"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  cleanup:
    name: Delete old completed runs
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Cleanup runs older than 30 days
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const retentionDays = 30;
            const cutoffMs = Date.now() - retentionDays * 24 * 60 * 60 * 1000;

            let page = 1;
            let deleted = 0;
            let scanned = 0;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const runs = data.workflow_runs || [];
              if (runs.length === 0) break;

              for (const run of runs) {
                scanned += 1;
                const createdMs = new Date(run.created_at).getTime();
                const isOld = createdMs < cutoffMs;
                const isCompleted = run.status === "completed";

                if (!isCompleted || !isOld) continue;

                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });

                deleted += 1;
                core.info(`Deleted run ${run.id} (${run.name}) created at ${run.created_at}`);
              }

              if (runs.length < 100) break;
              page += 1;
            }

            core.notice(`Scanned ${scanned} runs; deleted ${deleted} completed runs older than ${retentionDays} days.`);
