name: Nix CI Light

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "wallpapers/**"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "wallpapers/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  eval-tests:
    name: Eval Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run lightweight eval checks
        run: |
          set -euo pipefail

          nix build --no-link \
            .#checks.x86_64-linux.evaltest-hostname \
            .#checks.x86_64-linux.evaltest-home \
            .#checks.x86_64-linux.evaltest-kernel \
            .#checks.x86_64-linux.evaltest-platform

          nix eval .#checks.aarch64-darwin.evaltest-darwin-hostname.drvPath >/dev/null
          nix eval .#checks.aarch64-darwin.evaltest-darwin-home.drvPath >/dev/null
          nix eval .#checks.aarch64-darwin.evaltest-darwin-platform.drvPath >/dev/null
