name: Flake Lock Freshness Check (Manual)

on:
  workflow_dispatch:

jobs:
  flake-checker:
    name: Check flake.lock freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          extra_nix_config: |
            eval-cores = 0

      - name: Run flake checker
        uses: DeterminateSystems/flake-checker-action@v12
