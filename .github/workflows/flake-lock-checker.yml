name: Flake Lock Checker

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  flake-checker:
    name: Check lock freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            eval-cores = 0

      - name: Run flake checker
        uses: DeterminateSystems/flake-checker-action@v12
