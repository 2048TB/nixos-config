name: ci

on:
  pull_request:
  push:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Repo Check
        run: ./scripts/repo-check.sh --full

  darwin-checks:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Dry-Run Darwin Host
        run: nix build --dry-run '.#darwinConfigurations.mbp-work.system'

      - name: Dry-Run Standalone Home Manager
        run: nix build --dry-run '.#homeConfigurations."z@mbp-work".activationPackage'
