name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/**"
      - "nix/**"
      - "lib/**"
      - "scripts/**"
      - "justfile"
      - ".github/workflows/**"
  push:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "hosts/**"
      - "nix/**"
      - "lib/**"
      - "scripts/**"
      - "justfile"
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-host-matrix:
    name: Prepare NixOS Host Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      hosts: ${{ steps.resolve-hosts.outputs.hosts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Resolve Hosts
        id: resolve-hosts
        run: |
          hosts_json="$(nix eval --accept-flake-config --json path:.#nixosConfigurations --apply builtins.attrNames)"
          if [ "$hosts_json" = "[]" ]; then
            echo "error: no nixosConfigurations found" >&2
            exit 1
          fi
          echo "hosts=$hosts_json" >> "$GITHUB_OUTPUT"
          echo "resolved hosts: $hosts_json"

  eval-and-flake-check:
    name: Eval And Flake Check
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare-host-matrix
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Eval Tests
        run: |
          nix build --accept-flake-config --no-link \
            path:.#checks.x86_64-linux.evaltest-hostname \
            path:.#checks.x86_64-linux.evaltest-home
          nix eval --accept-flake-config path:.#checks.aarch64-darwin.evaltest-darwin-hostname.drvPath >/dev/null
          nix eval --accept-flake-config path:.#checks.aarch64-darwin.evaltest-darwin-home.drvPath >/dev/null

      - name: Flake Check
        run: nix flake check --accept-flake-config --all-systems path:.

  nixos-build:
    name: NixOS Build (${{ matrix.host }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: prepare-host-matrix
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.prepare-host-matrix.outputs.hosts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Enable Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build Host
        run: |
          nix build --accept-flake-config --no-link \
            path:.#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel
