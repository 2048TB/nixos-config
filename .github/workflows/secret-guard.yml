name: Repository Guard

on:
  pull_request:
  push:

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y just shellcheck shfmt ripgrep python3-yaml pipx
          pipx install check-jsonschema
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Self check
        run: just self-check

  guard-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Guard secrets
        run: bash nix/scripts/admin/guard-secrets.sh --all-tracked
