name: Secret Guard

on:
  pull_request:
  push:

jobs:
  guard-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Guard secrets
        run: bash nix/scripts/admin/guard-secrets.sh --all-tracked
