name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Flake eval + lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: ./.github/actions/setup-nix
        with:
          extra_nix_config: |
            eval-cores = 0

      - name: Shell script syntax check
        run: bash -n nix/scripts/admin/*.sh

      - name: Guard secrets check
        run: bash nix/scripts/admin/guard-secrets.sh

      - name: Flake check (eval only, no build)
        run: |
          flake_repo="$(bash nix/scripts/admin/print-flake-repo.sh .)"
          nix flake check --all-systems --no-build "path:$flake_repo"
